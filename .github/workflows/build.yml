name: Build LunaTV Static Files (Official Config)
on:
  workflow_dispatch:  # 手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      # 严格按照官方命令构建
      - name: Install & Build (Official Command)
        env:
          USERNAME: root
          PASSWORD: 888888
        run: pnpm install --frozen-lockfile && pnpm run pages:build

      # 上传官方指定的输出目录
      - name: Upload static files
        uses: actions/upload-artifact@v4
        with:
          name: lunatv-static
          path: .vercel/output/static
