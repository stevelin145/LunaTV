name: Build LunaTV Static Files

# 两种触发方式：手动触发 / 推送代码自动构建
on:
  workflow_dispatch:    # 手动触发（你需要的）
  push:
    branches: [ main ]  # 可选：推代码自动构建

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        actions:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build static files
        run: npm run build   # 生成 dist 文件夹

      # 把 dist 打包成 zip 供下载
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunatv-static  # 下载文件名
          path: dist           # 要打包的目录（Vue 构建结果）
