name: Build Only (No Deploy)
on:
  workflow_dispatch: 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      USERNAME: root
      PASSWORD: 888888
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install & Build（官方命令）
        run: pnpm install --frozen-lockfile && pnpm run pages:build

      - name: Upload 静态包
        uses: actions/upload-artifact@v4
        with:
          name: static-files
          path: .vercel/output/static
